<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AutoMoto Gallery</title>
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutoMoto">
<link rel="manifest" href="./site.webmanifest">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--ac:#38bdf8;--ab:#f97316;--ap:#a78bfa;--bg2:#12121a;--bg3:#16161f;--bd:#1e1e2e}
header{padding:1.75rem 1.5rem .85rem;text-align:center;border-bottom:1px solid var(--bd)}
.logo{font-size:2rem;font-weight:700;letter-spacing:-1px}
.logo .lc{color:var(--ac)}.logo .lb{color:var(--ab)}
.tagline{color:#6b6b80;font-size:.8rem;margin-top:.2rem}
/* tabs */
.main-tabs{display:flex;border-bottom:1px solid var(--bd);background:#0d0d14}
.main-tab{padding:.65rem 1.25rem;font-size:.82rem;color:#6b6b80;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.main-tab.active{color:var(--ac);border-color:var(--ac)}
/* controls */
.controls{padding:1rem 1.5rem;display:flex;flex-wrap:wrap;gap:.65rem;align-items:center;background:#0d0d14;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.sw{position:relative;flex:1;min-width:180px}
.sw input{width:100%;background:#1a1a26;border:1px solid #2a2a3e;border-radius:8px;padding:.45rem .7rem .45rem 2.1rem;color:#e0e0e0;font-size:.85rem;outline:none}
.sw input:focus{border-color:var(--ac)}
.si{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);font-size:.82rem}
.fbts{display:flex;gap:.4rem;flex-wrap:wrap}
.fb{background:#1a1a26;border:1px solid #2a2a3e;border-radius:20px;padding:.3rem .8rem;color:#9090a0;font-size:.78rem;cursor:pointer;transition:all .2s}
.fb.ac{border-color:var(--ac);color:var(--ac);background:#0f1e2a}
.fb.ab{border-color:var(--ab);color:var(--ab);background:#2a1a0f}
.fb.aa{border-color:var(--ap);color:var(--ap);background:#1e1a2e}
.fb.av{border-color:#22d3ee;color:#22d3ee;background:#0a1e20}
select.sel{background:#1a1a26;border:1px solid #2a2a3e;border-radius:8px;padding:.38rem .65rem;color:#9090a0;font-size:.78rem;outline:none;cursor:pointer}
/* stats bar */
.sb{padding:.45rem 1.5rem;background:#0a0a0f;border-bottom:1px solid var(--bd);display:flex;gap:1.25rem;font-size:.76rem;color:#6b6b80;flex-wrap:wrap}
.sv{color:#e0e0e0;font-weight:500}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.9rem;padding:1.1rem 1.5rem}
/* card */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;position:relative}
.card:hover{transform:translateY(-3px)}
.card.type-car:hover{border-color:var(--ac)}
.card.type-bike:hover{border-color:var(--ab)}
.card.type-vn:hover{border-color:#22d3ee}
.cv{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cv svg{width:88%;height:78%;transition:transform .3s}
.card:hover .cv svg{transform:scale(1.06)}
.cbadge{position:absolute;top:.45rem;left:.45rem;font-size:.62rem;font-weight:600;padding:.18rem .45rem;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
.bcar{background:#0f1e2a;color:var(--ac);border:1px solid #38bdf833}
.bbike{background:#2a1a0f;color:var(--ab);border:1px solid #f9731633}
.bvn{background:#0a1e20;color:#22d3ee;border:1px solid #22d3ee33}
.fbtn{position:absolute;top:.45rem;right:.45rem;background:none;border:none;color:#3a3a50;font-size:1rem;cursor:pointer;line-height:1;padding:.15rem;transition:color .2s}
.fbtn:hover,.card.faved .fbtn{color:var(--ab)}
.cchk{position:absolute;bottom:.45rem;right:.45rem;width:16px;height:16px;accent-color:var(--ap);cursor:pointer}
.ci{padding:.65rem .9rem .75rem}
.cbrand{font-size:.68rem;color:#6b6b80;text-transform:uppercase;letter-spacing:.4px}
.cname{font-size:.9rem;font-weight:600;color:#e8e8f0;margin:.08rem 0 .45rem}
.cstats{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:#1a1a26;border-radius:4px;padding:.12rem .4rem;font-size:.67rem;color:#8080a0}
.chip span{color:#c0c0d8;font-weight:500}
/* modal */
.mo{display:none;position:fixed;inset:0;background:#00000095;z-index:500;align-items:center;justify-content:center;padding:1rem}
.mo.show{display:flex}
.modal{background:var(--bg2);border:1px solid #2a2a3e;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;position:relative}
.mcl{position:absolute;top:.65rem;right:.65rem;background:#1a1a26;border:1px solid #2a2a3e;border-radius:6px;color:#8080a0;padding:.2rem .55rem;cursor:pointer;font-size:.95rem;z-index:10}
.mh{padding:1.25rem 1.25rem .85rem;border-bottom:1px solid var(--bd)}
.mvis{height:180px;display:flex;align-items:center;justify-content:center;border-radius:10px;margin-bottom:.85rem}
.mvis svg{width:80%;height:85%}
.mtr{display:flex;align-items:flex-start;gap:.65rem}
.mbrand{font-size:.72rem;color:#6b6b80;text-transform:uppercase;letter-spacing:.4px}
.mname{font-size:1.3rem;font-weight:700;color:#f0f0ff}
.mbody{padding:.85rem 1.25rem 1.25rem}
/* modal tabs */
.mtabs{display:flex;gap:.25rem;margin-bottom:1rem;border-bottom:1px solid var(--bd)}
.mt{padding:.45rem .9rem;font-size:.78rem;color:#6b6b80;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.mt.on{color:var(--ac);border-color:var(--ac)}
/* specs */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.srow{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;padding:.32rem .45rem;background:#0d0d14;border-radius:5px}
.sk{font-size:.75rem;color:#6b6b80}
.sv2{font-size:.77rem;font-weight:500;color:#c8c8e0;text-align:right;max-width:58%;overflow-wrap:anywhere}
.stit{font-size:.68rem;color:#6b6b80;text-transform:uppercase;letter-spacing:.7px;margin-bottom:.5rem;padding-bottom:.28rem;border-bottom:1px solid var(--bd)}
/* variants */
.vlist{display:flex;flex-direction:column;gap:.35rem}
.vi{background:#0d0d14;border-radius:6px;padding:.38rem .6rem;display:flex;justify-content:space-between;align-items:center}
.vn{font-size:.8rem;color:#c0c0d8}
.vp{font-size:.78rem;font-weight:600;color:var(--ap)}
/* radar */
#radarCanvas{display:block;margin:0 auto}
/* compare panel */
.cpanel{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid #2a2a3e;z-index:200;padding:.65rem 1.5rem;gap:.65rem;align-items:center;flex-wrap:wrap}
.cpanel.show{display:flex}
.cslots{display:flex;gap:.45rem;flex:1;flex-wrap:wrap}
.cslot{background:#1a1a26;border:1px dashed #2a2a3e;border-radius:7px;padding:.35rem .65rem;font-size:.76rem;color:#505060;min-width:130px;display:flex;align-items:center;justify-content:space-between}
.cslot.filled{border-color:#a78bfa33;color:#c0c0d8}
.dob{background:var(--ap);border:none;border-radius:7px;padding:.45rem 1rem;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer}
.clr{background:none;border:1px solid #3a3a50;border-radius:7px;padding:.45rem .75rem;color:#6b6b80;font-size:.78rem;cursor:pointer}
/* compare table */
.ctbl{width:100%;border-collapse:collapse;font-size:.79rem}
.ctbl th{background:#0d0d14;padding:.45rem .65rem;color:#8080a0;font-weight:500;text-align:left;border-bottom:1px solid var(--bd)}
.ctbl td{padding:.4rem .65rem;border-bottom:1px solid #1a1a26;color:#c8c8e0}
.ctbl tr:nth-child(even) td{background:#0d0d1480}
.chi{color:var(--ap);font-weight:600}
/* leaderboard */
.lb-list{display:flex;flex-direction:column;gap:.5rem;padding:1rem 1.5rem}
.lb-row{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;transition:border-color .2s}
.lb-row:hover{border-color:var(--ap)}
.lb-rank{font-size:1.1rem;font-weight:700;color:#3a3a50;min-width:2rem;text-align:center}
.lb-rank.gold{color:#f59e0b}.lb-rank.silver{color:#9ca3af}.lb-rank.bronze{color:#b45309}
.lb-info{flex:1}
.lb-name{font-size:.88rem;font-weight:600;color:#e0e0f0}
.lb-sub{font-size:.72rem;color:#6b6b80}
.lb-val{font-size:1rem;font-weight:700;color:var(--ac)}
.lb-bar-wrap{flex:2;height:6px;background:#1a1a26;border-radius:3px;overflow:hidden}
.lb-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac),var(--ap))}
.lb-controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
/* no results */
.nr{grid-column:1/-1;text-align:center;padding:3rem;color:#50506080}
/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a0f}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
.modal-wide{max-width:760px}
@media (max-width:720px){
header{padding:1.25rem 1rem .75rem}
.logo{font-size:1.8rem}
.controls,.sb,.grid,.lb-list{padding-left:1rem;padding-right:1rem}
#tab-leaderboard{padding:1rem !important}
.controls{gap:.5rem}
.sw,.fbts,select.sel,#cmpBtn,#installBtn{width:100%}
.sw{flex:1 1 100%;min-width:100%}
.fbts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
.fbts .fb,.lb-controls .fb{width:100%;text-align:center}
select.sel{flex:1 1 100%}
#cmpBtn,#installBtn{margin-left:0 !important}
.sb{gap:.75rem;font-size:.74rem}
.grid{grid-template-columns:1fr;padding-top:.85rem}
.mo{padding:.5rem}
.modal,.modal-wide{max-width:none;max-height:94vh;border-radius:14px}
.mh,.mbody{padding-left:1rem;padding-right:1rem}
.mvis{height:150px}
.mtr{flex-direction:column}
.mtabs{overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding-bottom:.15rem}
.mt{flex:0 0 auto}
.sgrid{grid-template-columns:1fr}
.srow{flex-direction:column;gap:.2rem}
.sv2{max-width:none;text-align:left}
.vi{flex-direction:column;align-items:flex-start;gap:.45rem}
.cpanel{padding:.75rem 1rem;flex-direction:column;align-items:stretch}
.cslots{width:100%;flex-direction:column}
.cslot{min-width:0}
.dob,.clr{width:100%}
.lb-controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
.lb-row{flex-wrap:wrap;align-items:flex-start}
.lb-bar-wrap{flex:1 1 100%}
.lb-val{margin-left:auto}
}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="lc">AUTO</span><span class="lb">MOTO</span></div>
  <div class="tagline">Car &amp; Bike Enthusiast Gallery - Specs, Variants, Performance, PWA Ready</div>
</header>
<div class="main-tabs">
  <div class="main-tab active" onclick="switchTab('gallery',this)">Gallery</div>
  <div class="main-tab" onclick="switchTab('leaderboard',this)">Leaderboard</div>
</div>

<!-- GALLERY -->
<div id="tab-gallery">
<div class="controls">
  <div class="sw"><span class="si">&#128269;</span><input type="text" id="searchInput" placeholder="Search name, brand, category..."></div>
  <div class="fbts">
    <button class="fb aa" onclick="setFilter('all',this)">All</button>
    <button class="fb" onclick="setFilter('car',this)">Cars</button>
    <button class="fb" onclick="setFilter('bike',this)">Bikes</button>
    <button class="fb" onclick="setFilter('vn',this)">VN Market</button>
  </div>
  <select class="sel" id="brandSel" onchange="renderGrid()"><option value="">All Brands</option></select>
  <select class="sel" id="sortSel" onchange="renderGrid()">
    <option value="">Sort: Default</option>
    <option value="power">Most Powerful (HP)</option>
    <option value="speed">Top Speed (km/h)</option>
    <option value="price_asc">Price USD Low-High</option>
    <option value="price_desc">Price USD High-Low</option>
  </select>
  <button class="fb" id="cmpBtn" onclick="toggleCompare()" style="margin-left:auto">Compare</button>
  <button class="fb" id="installBtn" hidden>Install App</button>
</div>
<div class="sb">
  <span>Showing <span class="sv" id="countD">0</span> vehicles</span>
  <span>Cars <span class="sv" id="carD">0</span></span>
  <span>Bikes <span class="sv" id="bikeD">0</span></span>
  <span>VN Market <span class="sv" id="vnD">0</span></span>
  <span>Favorites <span class="sv" id="favD">0</span></span>
</div>
<div class="grid" id="vGrid"></div>
</div>

<!-- LEADERBOARD -->
<div id="tab-leaderboard" style="display:none;padding:1rem 1.5rem">
  <div class="lb-controls">
    <button class="fb aa" onclick="setLbMode('power',this)">Most Powerful (HP)</button>
    <button class="fb" onclick="setLbMode('speed',this)">Top Speed (km/h)</button>
    <button class="fb" onclick="setLbMode('accel',this)">0-60 Fastest (s)</button>
    <button class="fb" onclick="setLbMode('light',this)">Lightest (kg)</button>
  </div>
  <div class="lb-list" id="lbList"></div>
</div>

<!-- Detail Modal -->
<div class="mo" id="dModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <button class="mcl" onclick="document.getElementById('dModal').classList.remove('show')">&times;</button>
    <div id="dContent"></div>
  </div>
</div>
<!-- Compare Modal -->
<div class="mo" id="cModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal modal-wide">
    <button class="mcl" onclick="document.getElementById('cModal').classList.remove('show')">&times;</button>
    <div id="cContent"></div>
  </div>
</div>
<!-- Compare Panel -->
<div class="cpanel" id="cPanel">
  <div class="cslots" id="cSlots"></div>
  <button class="dob" onclick="showComparison()">Open Compare</button>
  <button class="clr" onclick="clearCmp()">Clear</button>
</div>

const USD_TO_VND = 26340;
const LBFT_TO_NM = 1.3558179483314;
const MPH_TO_KPH = 1.609344;
const LB_TO_KG = 0.45359237;
const MI_TO_KM = 1.609344;

let filt='all', brandF='', searchQ='', favs=new Set(), cmpMode=false, cmpList=[], lbMode='power', curTab='gallery', curModalTab='specs';
let deferredInstallPrompt = null;

const usdFormatter = new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});

function formatNumber(value,digits=0){
  return Number(value).toLocaleString('en-US',{minimumFractionDigits:digits,maximumFractionDigits:digits});
}

function formatUsd(value){return value==null?'-':usdFormatter.format(Math.round(value));}
function formatPower(v){return `${formatNumber(v.powerHp,0)} HP`;}
function formatTorque(v){return `${formatNumber(v.torqueNm,0)} Nm`;}
function formatTopSpeed(v){return `${formatNumber(v.topSpeedKph,0)} km/h`;}
function formatWeight(v){return `${formatNumber(v.weightKg,0)} kg`;}
function formatAccel(value){return `${formatNumber(value,value<3?2:1)} s`;}
function formatMeters(value){return `${formatNumber(value,2)} m`;}
function formatLiters(value){return `${formatNumber(value,1)} L`;}
function formatRange(value){return `${formatNumber(value,0)} km`;}
function formatFuelUse(value){return `${formatNumber(value,1)} L/100 km`;}

function parsePriceUsd(text){
  if(!text) return null;
  const source=String(text);
  if(/vnd|tr/i.test(source)){
    const match=source.match(/([\d.]+)\s*tr/i);
    return match?(parseFloat(match[1])*1000000)/USD_TO_VND:null;
  }
  const match=source.replace(/,/g,'').match(/(\d+(?:\.\d+)?)/);
  return match?parseFloat(match[1]):null;
}

function parseEngineLiters(text){
  const source=String(text||'');
  let match=source.match(/(\d+(?:\.\d+)?)\s*L/i);
  if(match) return parseFloat(match[1]);
  match=source.match(/(\d+(?:\.\d+)?)\s*cc/i);
  return match?parseFloat(match[1])/1000:null;
}

function parseMillimetersToMeters(text){
  const match=String(text||'').match(/(\d+(?:\.\d+)?)\s*mm/i);
  return match?parseFloat(match[1])/1000:null;
}

function parseLitersValue(text){
  const match=String(text||'').match(/(\d+(?:\.\d+)?)\s*L/i);
  return match?parseFloat(match[1]):null;
}

function parseRangeKm(text){
  const source=String(text||'');
  let match=source.match(/(\d+(?:\.\d+)?)\s*km/i);
  if(match) return parseFloat(match[1]);
  match=source.match(/(\d+(?:\.\d+)?)\s*mi/i);
  return match?parseFloat(match[1])*MI_TO_KM:null;
}

function parseFuelUse(text){
  const match=String(text||'').match(/(\d+(?:\.\d+)?)\s*L\/100\s*km/i);
  return match?parseFloat(match[1]):null;
}

function normalizeEngineLabel(text){
  const source=String(text||'');
  const liters=parseEngineLiters(source);
  if(liters==null) return source||'-';
  const amount=liters>=1?liters.toFixed(1):liters.toFixed(2);
  const rest=source.replace(/(\d+(?:\.\d+)?)\s*(L|cc)/i,'').replace(/\s+/g,' ').trim();
  return `${amount} L${rest?` ${rest}`:''}`;
}

function normalizeVehicle(v){
  const priceUsd=v.type==='vn'?(parsePriceUsd(v.priceStr)??v.price):v.price;
  const variants=v.variants.map(variant=>({...variant,priceUsd:parsePriceUsd(variant.p)}));
  Object.assign(v,{
    priceUsd,
    powerHp:v.power,
    torqueNm:v.type==='vn'?v.torque:v.torque*LBFT_TO_NM,
    topSpeedKph:v.type==='vn'?v.topSpeed:v.topSpeed*MPH_TO_KPH,
    weightKg:v.weightLb*LB_TO_KG,
    engineLabel:normalizeEngineLabel(v.specs.Engine),
    seatM:parseMillimetersToMeters(v.specs.Seat),
    tankL:parseLitersValue(v.specs.Tank),
    rangeKm:parseRangeKm(v.specs.Range),
    fuelUseL:parseFuelUse(v.specs.Fuel),
    variants
  });
  return v;
}

function getSummarySpecs(v){
  return [
    ['Power',formatPower(v)],
    ['Top Speed',formatTopSpeed(v)],
    ['Weight',formatWeight(v)],
  ];
}

function getSpecRows(v){
  const rows=[
    ['Price',formatUsd(v.priceUsd)],
    ['Power',formatPower(v)],
    ['Torque',formatTorque(v)],
    ['Top Speed',formatTopSpeed(v)],
    ['0-60 mph',formatAccel(v.zeroSixty)],
    ['Weight',formatWeight(v)],
    ['Engine',v.engineLabel],
  ];
  if(v.specs.Drivetrain) rows.push(['Drivetrain',v.specs.Drivetrain]);
  if(v.specs.Trans) rows.push(['Transmission',v.specs.Trans]);
  if(v.seatM!=null) rows.push(['Seat Height',formatMeters(v.seatM)]);
  if(v.tankL!=null) rows.push(['Tank',formatLiters(v.tankL)]);
  if(v.rangeKm!=null) rows.push(['Range',formatRange(v.rangeKm)]);
  if(v.fuelUseL!=null) rows.push(['Fuel Use',formatFuelUse(v.fuelUseL)]);
  if(v.specs.Electronics) rows.push(['Electronics',v.specs.Electronics]);
  return rows;
}

function getComparisonRows(list){
  const rows=[
    ['Price',v=>formatUsd(v.priceUsd)],
    ['Category',v=>v.cat],
    ['Power',v=>formatPower(v)],
    ['Torque',v=>formatTorque(v)],
    ['Top Speed',v=>formatTopSpeed(v)],
    ['0-60 mph',v=>formatAccel(v.zeroSixty)],
    ['Weight',v=>formatWeight(v)],
    ['Engine',v=>v.engineLabel],
  ];
  const optional=[
    ['Seat Height',v=>v.seatM!=null?formatMeters(v.seatM):'-',v=>v.seatM!=null],
    ['Tank',v=>v.tankL!=null?formatLiters(v.tankL):'-',v=>v.tankL!=null],
    ['Range',v=>v.rangeKm!=null?formatRange(v.rangeKm):'-',v=>v.rangeKm!=null],
    ['Fuel Use',v=>v.fuelUseL!=null?formatFuelUse(v.fuelUseL):'-',v=>v.fuelUseL!=null],
    ['Drivetrain',v=>v.specs.Drivetrain||'-',v=>Boolean(v.specs.Drivetrain)],
    ['Transmission',v=>v.specs.Trans||'-',v=>Boolean(v.specs.Trans)],
    ['Electronics',v=>v.specs.Electronics||'-',v=>Boolean(v.specs.Electronics)],
  ];
  optional.forEach(([label,getter,predicate])=>{if(list.some(predicate)) rows.push([label,getter]);});
  return rows;
}

function filtered(){
  let list=V.filter(v=>{
    if(filt==='vn'&&v.type!=='vn') return false;
    if(filt==='car'&&v.type!=='car') return false;
    if(filt==='bike'&&v.type!=='bike') return false;
    if(brandF&&v.brand!==brandF) return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      if(!v.name.toLowerCase().includes(q)&&!v.brand.toLowerCase().includes(q)&&!v.cat.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const sort=document.getElementById('sortSel').value;
  if(sort==='power') list.sort((a,b)=>b.powerHp-a.powerHp);
  else if(sort==='speed') list.sort((a,b)=>b.topSpeedKph-a.topSpeedKph);
  else if(sort==='price_asc') list.sort((a,b)=>a.priceUsd-b.priceUsd);
  else if(sort==='price_desc') list.sort((a,b)=>b.priceUsd-a.priceUsd);
  return list;
}

function clamp01(value){return Math.max(0,Math.min(1,value));}

function drawRadar(canvasId,v){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-32;

  const maxPower=v.type==='vn'?25:v.type==='bike'?320:1500;
  const maxTorque=v.type==='vn'?20:v.type==='bike'?180:1600;
  const maxSpeed=v.type==='vn'?150:v.type==='bike'?410:430;
  const maxAccel=v.type==='vn'?15:v.type==='bike'?10:8;
  const maxWeight=v.type==='vn'?200:v.type==='bike'?300:3000;

  const axes=[
    {label:'Power',val:clamp01(v.powerHp/maxPower)},
    {label:'Torque',val:clamp01(v.torqueNm/maxTorque)},
    {label:'Top Speed',val:clamp01(v.topSpeedKph/maxSpeed)},
    {label:'Accel',val:clamp01(1-(v.zeroSixty/maxAccel))},
    {label:'Lightweight',val:clamp01(1-(v.weightKg/maxWeight))},
  ];

  const n=axes.length;
  const angle=i=>(-Math.PI/2)+(2*Math.PI/n)*i;

  ctx.clearRect(0,0,W,H);

  for(let ring=1;ring<=4;ring++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=angle(i),rr=(R/4)*ring;
      ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);
    }
    ctx.closePath();
    ctx.strokeStyle='#1e1e2e';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  for(let i=0;i<n;i++){
    const a=angle(i);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    ctx.strokeStyle='#2a2a3e';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  const accent=v.type==='vn'?'#22d3ee':v.type==='bike'?'#f97316':'#38bdf8';
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const a=angle(i),radius=R*axes[i].val;
    ctx.lineTo(cx+Math.cos(a)*radius,cy+Math.sin(a)*radius);
  }
  ctx.closePath();
  ctx.fillStyle=accent+'33';
  ctx.fill();
  ctx.strokeStyle=accent;
  ctx.lineWidth=2;
  ctx.stroke();

  for(let i=0;i<n;i++){
    const a=angle(i),radius=R*axes[i].val;
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*radius,cy+Math.sin(a)*radius,4,0,Math.PI*2);
    ctx.fillStyle=accent;
    ctx.fill();
  }

  ctx.fillStyle='#9090b0';
  ctx.font='11px Segoe UI,system-ui,sans-serif';
  ctx.textAlign='center';
  for(let i=0;i<n;i++){
    const a=angle(i),lx=cx+Math.cos(a)*(R+18),ly=cy+Math.sin(a)*(R+18);
    ctx.fillText(axes[i].label,lx,ly+4);
    ctx.fillStyle=accent;
    ctx.font='bold 10px Segoe UI,system-ui,sans-serif';
    ctx.fillText(Math.round(axes[i].val*100)+'%',lx,ly+16);
    ctx.fillStyle='#9090b0';
    ctx.font='11px Segoe UI,system-ui,sans-serif';
  }
}

function switchModalTab(tab,id){
  const v=V.find(item=>item.id===id);
  curModalTab=tab;
  document.querySelectorAll('.mt').forEach(node=>node.classList.remove('on'));
  document.getElementById('mt-'+tab).classList.add('on');
  const container=document.getElementById('mTabContent');
  if(tab==='specs') container.innerHTML=renderSpecsTab(v);
  else if(tab==='radar'){
    container.innerHTML=renderRadarTab(v);
    setTimeout(()=>drawRadar('radarCanvas',v),60);
  }else{
    container.innerHTML=renderVariantsTab(v);
  }
}

function toggleFav(e,id){
  e.stopPropagation();
  favs.has(id)?favs.delete(id):favs.add(id);
  renderGrid();
}

function toggleCompare(){
  cmpMode=!cmpMode;
  const btn=document.getElementById('cmpBtn');
  btn.className=cmpMode?'fb ab':'fb';
  btn.textContent=cmpMode?'Comparing':'Compare';
  if(!cmpMode) clearCmp();
  else renderGrid();
}

function toggleCmp(e,id){
  e.stopPropagation();
  if(cmpList.includes(id)) cmpList=cmpList.filter(item=>item!==id);
  else if(cmpList.length<3) cmpList.push(id);
  else{
    alert('Max 3 vehicles');
    return;
  }
  renderGrid();
  updateCmpPanel();
}

function updateCmpPanel(){
  const panel=document.getElementById('cPanel');
  const slots=document.getElementById('cSlots');
  if(!cmpMode){
    panel.classList.remove('show');
    return;
  }
  panel.classList.add('show');
  const items=cmpList.map(id=>{
    const v=V.find(item=>item.id===id);
    return `<div class="cslot filled">${v.brand} ${v.name}<button class="clr" style="padding:.1rem .4rem;font-size:.75rem" onclick="toggleCmp(event,${id})">&times;</button></div>`;
  });
  while(items.length<3) items.push('<div class="cslot">+ Add vehicle</div>');
  slots.innerHTML=items.join('');
}

function clearCmp(){
  cmpMode=false;
  cmpList=[];
  document.getElementById('cmpBtn').className='fb';
  document.getElementById('cmpBtn').textContent='Compare';
  document.getElementById('cPanel').classList.remove('show');
  renderGrid();
}

function showComparison(){
  if(cmpList.length<2){
    alert('Select at least 2 vehicles');
    return;
  }
  const list=cmpList.map(id=>V.find(item=>item.id===id));
  const rows=getComparisonRows(list);
  document.getElementById('cContent').innerHTML=`
    <div style="padding:1.25rem 1.25rem .85rem;border-bottom:1px solid var(--bd)">
      <div style="font-size:1.15rem;font-weight:700;color:#f0f0ff">Comparison</div>
      <div style="font-size:.78rem;color:#6b6b80">${list.map(v=>v.name).join(' vs ')}</div>
    </div>
    <div style="padding:.85rem 1.25rem;overflow-x:auto">
      <table class="ctbl">
        <thead><tr><th style="width:130px">Spec</th>${list.map(v=>`<th>${v.brand}<br><span style="color:#e0e0e0;font-weight:600">${v.name}</span></th>`).join('')}</tr></thead>
        <tbody>
          ${rows.map(([label,getter])=>`<tr><td style="color:#6b6b80;font-size:.75rem">${label}</td>${list.map(v=>`<td>${getter(v)}</td>`).join('')}</tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  document.getElementById('cModal').classList.add('show');
}

function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.main-tab').forEach(node=>node.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-gallery').style.display=tab==='gallery'?'':'none';
  document.getElementById('tab-leaderboard').style.display=tab==='leaderboard'?'':'none';
  if(tab==='leaderboard') renderLeaderboard();
}

function setLbMode(mode,btn){
  lbMode=mode;
  document.querySelectorAll('#tab-leaderboard .fb').forEach(button=>button.className='fb');
  btn.className='fb aa';
  renderLeaderboard();
}

function renderLeaderboard(){
  let list=[...V];
  let getVal;
  let formatVal;
  if(lbMode==='power'){
    list.sort((a,b)=>b.powerHp-a.powerHp);
    getVal=v=>v.powerHp;
    formatVal=v=>formatPower(v);
  }else if(lbMode==='speed'){
    list.sort((a,b)=>b.topSpeedKph-a.topSpeedKph);
    getVal=v=>v.topSpeedKph;
    formatVal=v=>formatTopSpeed(v);
  }else if(lbMode==='accel'){
    list.sort((a,b)=>a.zeroSixty-b.zeroSixty);
    getVal=v=>v.zeroSixty;
    formatVal=v=>formatAccel(v.zeroSixty);
  }else{
    list.sort((a,b)=>a.weightKg-b.weightKg);
    getVal=v=>v.weightKg;
    formatVal=v=>formatWeight(v);
  }
  list=list.slice(0,20);
  const maxVal=Math.max(...list.map(getVal));
  const minVal=Math.min(...list.map(getVal));
  const spread=maxVal-minVal||1;
  document.getElementById('lbList').innerHTML=list.map((v,index)=>{
    const value=getVal(v);
    const pct=lbMode==='accel'||lbMode==='light'?1-((value-minVal)/spread):value/(maxVal||1);
    const rankClass=index===0?'gold':index===1?'silver':index===2?'bronze':'';
    return `<div class="lb-row" onclick="openDetail(${v.id})">
      <div class="lb-rank ${rankClass}">${index+1}</div>
      <div class="lb-info">
        <div class="lb-name">${v.brand} ${v.name}</div>
        <div class="lb-sub">${v.cat} / ${v.year}</div>
      </div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(clamp01(pct)*100)}%"></div></div>
      <div class="lb-val">${formatVal(v)}</div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQ=e.target.value;
  renderGrid();
});

const installBtn=document.getElementById('installBtn');
installBtn.addEventListener('click',async ()=>{
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const choice=await deferredInstallPrompt.userChoice;
  if(choice.outcome==='accepted') installBtn.hidden=true;
  deferredInstallPrompt=null;
});

window.addEventListener('beforeinstallprompt',event=>{
  event.preventDefault();
  deferredInstallPrompt=event;
  installBtn.hidden=false;
});

window.addEventListener('appinstalled',()=>{
  deferredInstallPrompt=null;
  installBtn.hidden=true;
});

if('serviceWorker' in navigator && window.location.protocol!=='file:'){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(error=>{
      console.error('Service worker registration failed',error);
    });
  });
}

populateBrands();
renderGrid();
</script>
</body>
</html>
